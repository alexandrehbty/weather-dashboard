name: GeoMeteo CI 🌦️

# Déclencheur : Sur chaque push ou pull request sur la branche main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Récupérer le code
    - uses: actions/checkout@v4

    # 2. Installer Python
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    # 3. Installer les dépendances
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-playwright pytest-rerunfailures # NOUVEAU

    # 4. Installer les navigateurs pour Playwright (NOUVEAU)
    - name: Install Playwright Browsers
      run: playwright install --with-deps chromium

    # 5. Lancer le serveur et les tests E2E (MODIFIÉ)
    - name: Run E2E Tests
      env:
        API_KEY: ${{ secrets.API_KEY }}
      run: |
        # Lancer le serveur Flask en arrière-plan
        python app.py &
        # Attendre 3 secondes que le serveur démarre
        sleep 3
        # Lancer les tests E2E avec Retry
        pytest e2e/test_e2e_cold_start.py --reruns 2

  build-and-push:
    name: 🐳 Build & Push Docker Image
    needs: [test] # Ne se lance QUE si le job "test" (tes tests actuels) a réussi
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Autorise GitHub Actions à publier des paquets/images

    steps:
      - name: 📥 Check out the repo
        uses: actions/checkout@v4

      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: 📦 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}