name: GeoMeteo CI 🌦️

# Déclencheur : Sur chaque push ou pull request sur la branche main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # 1. Récupérer le code
    - uses: actions/checkout@v3

    # 2. Installer Python
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # 3. Installer les dépendances
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-playwright pytest-rerunfailures # NOUVEAU

    # 4. Installer les navigateurs pour Playwright (NOUVEAU)
    - name: Install Playwright Browsers
      run: playwright install --with-deps chromium

    # 5. Lancer le serveur et les tests E2E (MODIFIÉ)
    - name: Run E2E Tests
      env:
        API_KEY: "test_dummy_key"
      run: |
        # Lancer le serveur Flask en arrière-plan
        python app.py &
        # Attendre 3 secondes que le serveur démarre
        sleep 3
        # Lancer les tests E2E avec Retry
        pytest e2e/test_e2e_cold_start.py --reruns 2